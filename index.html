<div id="dashboard" class="fixed inset-0 bg-[#06030e] hidden z-[100] flex flex-col">
    <nav class="flex justify-between items-center px-10 py-4 bg-[#0a0518] border-b border-white/5">
        <div class="flex items-center gap-4">
            <div class="logo-box-small"><i class="fas fa-rocket text-white"></i></div>
            <span class="font-black uppercase italic text-lg">VKP<span class="text-purple-500">.REX</span></span>
        </div>
        
        <div class="hidden md:flex flex-1 max-w-md mx-10">
            <div class="relative w-full">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-xs"></i>
                <input type="text" placeholder="SEARCH INFRASTRUCTURE..." class="w-full bg-white/5 border border-white/10 rounded-xl py-2 pl-10 pr-4 text-[10px] font-bold text-white focus:outline-none focus:border-purple-500/50 transition">
            </div>
        </div>

        <div class="flex items-center gap-6">
            <div class="relative" style="z-index: 10000;">
                <div id="currencyBtn" class="currency-trigger flex items-center gap-2 cursor-pointer bg-white/5 border border-purple-500/30 px-5 py-2 rounded-xl">
                    <span id="currentFlag" class="text-purple-500 font-bold">₹</span> 
                    <span id="currentText" class="font-black text-[11px]">INR</span> 
                    <i class="fas fa-chevron-down text-[8px]"></i>
                </div>
                <div id="currencyMenu" class="absolute right-0 mt-2 w-40 bg-[#0d0721] border border-purple-500/50 rounded-xl hidden shadow-2xl">
                    <div onclick="changeCurrency('USD', 0.012, '$')" class="px-4 py-4 text-[11px] font-black hover:bg-purple-600/40 cursor-pointer border-b border-white/5 text-white uppercase">USD ($)</div>
                    <div onclick="changeCurrency('INR', 1, '₹')" class="px-4 py-4 text-[11px] font-black hover:bg-purple-600/40 cursor-pointer text-white uppercase">INR (₹)</div>
                </div>
            </div>
            <button onclick="location.reload()" class="text-[11px] font-black uppercase text-gray-500 hover:text-white transition">Logout</button>
        </div>
    </nav>

    <div class="flex-1 p-12 overflow-y-auto">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-8 max-w-7xl mx-auto">
            <div class="plan-card-dash bg-white/5 p-8 rounded-[2.5rem] border border-white/5">
                <span class="popular-tag">#1 POPULAR</span>
                <h3 class="text-xl font-black uppercase italic mt-4">Micro VPS</h3>
                <div class="flex justify-between items-center mt-8 pt-6 border-t border-white/5">
                    <span class="text-2xl font-black price-display" data-base="299">₹299/mo</span>
                    <div onclick="openCheckout('Micro VPS', 299)" class="order-btn-box bg-blue-600 px-6 py-2 rounded-lg text-[10px] font-black cursor-pointer">ORDER</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="checkoutModal" class="fixed inset-0 bg-black/95 hidden z-[500] flex items-center justify-center p-6 backdrop-blur-xl">
    <div class="bg-[#0d0721] border border-white/10 rounded-[3rem] p-10 w-full max-w-lg shadow-2xl">
        <h2 id="checkPlanName" class="text-3xl font-black italic uppercase mb-6 text-purple-500">Order Summary</h2>
        
        <div class="space-y-3 mb-6">
            <input type="text" id="custName" placeholder="YOUR FULL NAME" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-[10px] font-black text-white focus:border-purple-500 outline-none">
            <input type="tel" id="custPhone" placeholder="WHATSAPP / PHONE NO." class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-[10px] font-black text-white focus:border-purple-500 outline-none">
        </div>

        <div class="space-y-3 border-t border-white/5 pt-6 mb-6 text-[11px] font-bold uppercase tracking-wider">
            <div class="flex justify-between text-gray-400"><span>Base Price</span><span id="checkBase" class="text-white"></span></div>
            <div class="flex justify-between text-gray-400"><span>Tax (18%)</span><span id="checkTax" class="text-white"></span></div>
            <div class="flex justify-between text-2xl font-black text-cyan-400 pt-2 italic"><span>Total</span><span id="checkTotal"></span></div>
        </div>
        <button onclick="proceedToPay()" class="login-action-btn w-full py-5 mb-4">Proceed to Pay</button>
        <button onclick="closeCheckout()" class="w-full text-gray-600 font-black text-[10px] uppercase">Cancel</button>
    </div>
</div>

<div class="cursor-dot"></div>
<div class="cursor-outline"></div>
