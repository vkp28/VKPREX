<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VKP.REX | Elite Infrastructure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#06030e] text-white font-sans overflow-x-hidden">

    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <div id="landingPage">
        <nav class="flex justify-between items-center px-10 py-5 sticky top-0 z-50 glass-nav border-b border-white/5">
            <div class="flex items-center gap-3">
                <div class="logo-box"><span class="font-black italic text-white text-xl">V</span></div>
                <div class="text-2xl font-black uppercase tracking-tighter italic">VKP<span class="text-purple-400">.REX</span></div>
            </div>
            <button onclick="openAuth()" class="login-action-btn">Login Access</button>
        </nav>

        <section class="relative py-48 text-center">
            <div class="hero-glow"></div>
            <h1 class="text-[8rem] md:text-[10rem] font-black tracking-tighter uppercase italic leading-none opacity-90">VKP<span class="text-purple-600">.REX</span></h1>
            <p class="text-purple-400/30 text-sm uppercase tracking-[1.5em] mb-16">Global hosting infrastructure</p>
            <button onclick="scrollToSolutions()" class="explore-btn">Explore Solutions <i class="fas fa-arrow-down ml-3"></i></button>
        </section>

        <section id="solutions-grid" class="max-w-7xl mx-auto px-6 py-24">
            <div class="text-center mb-20">
                <div class="hosting-badge">Beyond Gaming</div>
                <h2 class="text-6xl font-black uppercase italic tracking-tighter mt-4">Complete Hosting <span class="text-purple-600">Solution.</span></h2>
            </div>
            <div class="grid md:grid-cols-4 gap-6">
                <div class="solution-card">
                    <div class="icon-circle text-orange-500"><i class="fas fa-desktop"></i></div>
                    <h3 class="font-black italic uppercase text-xl mb-4">RDP Hosting</h3>
                    <p class="mb-8 font-bold text-[10px] uppercase text-gray-500">Full admin control with NVMe speed.</p>
