<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBO-X | Future Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <nav class="top-bar">
        <div class="logo">ROBO<span>X</span></div>
        <div class="nav-right">
            <div class="cart-icon" onclick="openCart()">
                🛒 Cart (<span id="cart-count">0</span>)
            </div>
        </div>
    </nav>

    <header class="hero">
        <h1>Advanced Robotics</h1>
        <p>Premium hardware for the next generation.</p>
    </header>

    <main class="product-grid" id="product-grid">
        </main>

    <div id="payment-modal" class="modal">
        <div class="glass-card">
            <h2 id="modal-title">Complete Purchase</h2>
            <div id="modal-content">
                <input type="email" id="user-email" placeholder="Email ID" class="glass-input">
                <input type="tel" id="user-phone" placeholder="Phone Number" class="glass-input">
                <button class="buy-btn" onclick="processPayment()">Confirm Order</button>
            </div>
            <p onclick="closeModal()" class="close-btn">Close</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
